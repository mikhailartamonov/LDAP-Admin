name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  WIDGETSET: qt5

jobs:
  # ---------------------------------------------------------------- Ubuntu
  # Produces the .deb and the portable AppImage. Built against Ubuntu's own
  # libraries so the .deb is ABI-correct, using the official Lazarus .debs
  # (complete toolchain — no missing units like the distro's split packages).
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Runtime / link deps (Qt5 bindings, 7zip)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libqt5pas1 libqt5pas-dev fakeroot file p7zip-full curl patchelf \
            qtbase5-dev qttools5-dev-tools libqt5svg5
          # linuxdeploy's Qt plugin (AppImage) needs qmake + the Qt5 platform
          # plugins; libqt5pas alone doesn't pull them in.

      # Installs a complete, correctly-configured Lazarus+FPC (official build),
      # avoiding the distro's split-package quirks.
      - name: Install Lazarus
        uses: gcarreno/setup-lazarus@v3.4.1
        with:
          lazarus-version: stable

      - name: Build
        run: WIDGETSET="$WIDGETSET" packaging/build.sh

      - name: Package .deb
        run: WIDGETSET="$WIDGETSET" packaging/build-deb.sh

      - name: Package AppImage (best-effort)
        continue-on-error: true
        run: WIDGETSET="$WIDGETSET" packaging/build-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb-appimage
          path: dist/*

  # ----------------------------------------------------------------- Arch
  # Produces a native pacman package using Arch's complete toolchain and the
  # in-repo qt5pas. makepkg runs as a non-root build user.
  arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install toolchain
        run: |
          # curl + p7zip are needed by build.sh to fetch the mORMot2 static
          # libs; makepkg runs without -s so they must already be present.
          pacman -Syu --noconfirm --needed git base-devel lazarus-qt5 qt5pas openssl curl p7zip

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build package (makepkg)
        run: |
          set -e
          useradd -m builder
          cp packaging/PKGBUILD .
          # Build the exact checked-out commit instead of a remote tag.
          sed -i "s#^source=.*#source=(\"\$pkgname::git+file://$GITHUB_WORKSPACE\")#" PKGBUILD
          git config --global --add safe.directory '*'
          chown -R builder:builder "$GITHUB_WORKSPACE"
          # makepkg runs as 'builder'; it needs its own safe.directory or git
          # refuses the workspace ("dubious ownership").
          sudo -u builder git config --global --add safe.directory '*'
          sudo -u builder makepkg -f --noconfirm --skipinteg
          mkdir -p dist && cp *.pkg.tar.zst dist/

      - uses: actions/upload-artifact@v4
        with:
          name: arch-pkg
          path: dist/*

  # -------------------------------------------------------------- Release
  release:
    needs: [ubuntu, arch]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # --------------------------------------------------------------- Pages
  # Publish a flat apt repository (from the .deb) to the `gh-pages` branch, so
  # users can `apt install ldapadmin` and get updates. We push a branch instead
  # of using the Pages "deployment" API so the job is always green even before
  # Pages is switched on. Turn it on once: Settings -> Pages -> Branch: gh-pages.
  pages:
    needs: [ubuntu]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-deb-appimage
          path: incoming

      - name: Build flat apt repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends dpkg-dev apt-utils
          mkdir -p site/apt
          cp incoming/*.deb site/apt/
          ( cd site/apt
            dpkg-scanpackages -m . > Packages
            gzip -9c Packages > Packages.gz
            apt-ftparchive release . > Release )
          cat > site/index.html <<'HTML'
          <!doctype html><meta charset=utf-8><title>LDAP Admin for Linux</title>
          <h1>LDAP Admin for Linux</h1>
          <p>APT repository. Add it with:</p>
          <pre>echo "deb [trusted=yes] https://mikhailartamonov.github.io/LDAP-Admin/apt ./" | sudo tee /etc/apt/sources.list.d/ldapadmin.list
          sudo apt update &amp;&amp; sudo apt install ldapadmin</pre>
          <p>See the <a href="https://github.com/mikhailartamonov/LDAP-Admin">repository</a> and its <a href="https://github.com/mikhailartamonov/LDAP-Admin/releases">releases</a>.</p>
          HTML

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          force_orphan: true
